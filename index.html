<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Layout - AC2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #7dd3c0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }

        .browser-window {
            background-color: #d4d4d4;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 12px;
        }

        .browser-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .browser-button {
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }

        .btn-red {
            background-color: #ff5f57;
        }

        .btn-yellow {
            background-color: #ffbd2e;
        }

        .btn-green {
            background-color: #28ca42;
        }

        .layout-container {
            background-color: white;
            border-radius: 5px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 10px;
            min-height: 350px;
        }

        header {
            grid-column: 1 / 3;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
        }

        .header-left {
            background-color: #ff6b6b;
            border-radius: 5px;
            min-height: 60px;
        }

        .header-right {
            background-color: #ff6b6b;
            border-radius: 5px;
            min-height: 60px;
        }

        main {
            grid-column: 1 / 3;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .sidebar {
            background-color: #ffa94d;
            border-radius: 5px;
            min-height: 150px;
        }

        .content-area {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
        }

        .content-top {
            background-color: #a61e69;
            border-radius: 5px;
        }

        .content-bottom {
            background-color: #a61e69;
            border-radius: 5px;
        }

        footer {
            grid-column: 1 / 3;
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
        }

        .footer-box {
            background-color: #0c7489;
            border-radius: 5px;
            min-height: 60px;
        }

        @media (max-width: 768px) {
            .layout-container {
                grid-template-columns: 1fr;
            }

            header {
                grid-column: 1;
                grid-template-columns: 1fr;
            }

            main {
                grid-column: 1;
                grid-template-columns: 1fr;
            }

            footer {
                grid-column: 1;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="browser-window">
        <div class="browser-header">
            <div class="browser-button btn-red"></div>
            <div class="browser-button btn-yellow"></div>
            <div class="browser-button btn-green"></div>
        </div>

        <div class="layout-container">
            <header>
                <div class="header-left"></div>
                <div class="header-right"></div>
            </header>
            <main>
                <aside class="sidebar"></aside>
                <div class="content-area">
                    <section class="content-top"></section>
                    <section class="content-bottom"></section>
                </div>
            </main>
            <footer>
                <div class="footer-box"></div>
                <div class="footer-box"></div>
                <div class="footer-box"></div>
            </footer>
        </div>
    </div>
</body>

</html>
